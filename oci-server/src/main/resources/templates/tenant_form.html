<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout">
<body>
<th:block th:fragment="content">
    <h2>添加 / 编辑租户</h2>
    <form id="tenantForm" class="card p-4 shadow-sm mt-3" style="max-width: 600px;">
        <div class="mb-3">
            <label class="form-label">租户名称</label>
            <input type="text" name="tenancyName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">租户 ID（OCID）</label>
            <input type="text" name="tenantId" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">用户 ID（OCID）</label>
            <input type="text" name="tenancy" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">区域</label>
            <select name="region" class="form-select">
                <option value="ap-tokyo-1">ap-tokyo-1（东京）</option>
                <option value="ap-seoul-1">ap-seoul-1（首尔）</option>
                <option value="ap-osaka-1">ap-osaka-1（大阪）</option>
                <option value="us-ashburn-1">us-ashburn-1（阿什本）</option>
                <option value="us-phoenix-1">us-phoenix-1（凤凰城）</option>
                <option value="eu-frankfurt-1">eu-frankfurt-1（法兰克福）</option>
                <option value="uk-london-1">uk-london-1（伦敦）</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">指纹</label>
            <input type="text" name="fingerprint" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">私钥（PEM）</label>
            <textarea name="keyFile" class="form-control" rows="6" required></textarea>
            <div class="form-text">粘贴完整的 PEM 编码私钥</div>
        </div>
        <button type="submit" class="btn btn-primary">保存租户</button>
    </form>
</th:block>
</body>
</html>
